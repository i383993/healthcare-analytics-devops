apiVersion: apps/v1
kind: Deployment
metadata:
  name: spark-master
spec:
  replicas: 1
  selector:
    matchLabels:
      app: spark-master
  template:
    metadata:
      labels:
        app: spark-master
    spec:
      containers:
      - name: spark-master
        # Changed to your verified VS Code image name
        image: vsc-healthcare-analytics-5dd48c073337e3f3d865697be6f510b500a915f81ad6f6cfd31dba0d92134df8:latest
        imagePullPolicy: IfNotPresent  # CRITICAL: Prevents searching the internet
        ports:
        - containerPort: 8501
        - containerPort: 4040
        env:
        - name: SPARK_MODE
          value: "master"
        resources:
          requests:
            cpu: 500m
            memory: 1Gi
          limits:
            cpu: 1000m
            memory: 2Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: spark-worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: spark-worker
  template:
    metadata:
      labels:
        app: spark-worker
    spec:
      containers:
      - name: spark-worker
        # Changed from the placeholder to match the Master's image
        image: vsc-healthcare-analytics-5dd48c073337e3f3d865697be6f510b500a915f81ad6f6cfd31dba0d92134df8:latest
        imagePullPolicy: IfNotPresent  # CRITICAL: Forces it to use the local file
        ports:
        - containerPort: 4040
        env:
        - name: SPARK_MODE
          value: "worker"
        - name: SPARK_MASTER_URL
          value: "spark://spark-master:7077"
        resources:
          requests:
            cpu: 500m
            memory: 1Gi
          limits:
            cpu: 1000m
            memory: 2Gi

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: spark-worker-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: spark-worker
  minReplicas: 1
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70